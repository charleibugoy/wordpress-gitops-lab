apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
      - name: wordpress
        image: "wordpress:6.9.4-php8.2-apache"
        ports:
        - containerPort: 80
        env:
        - name: WORDPRESS_DB_HOST
          value: {{ .Values.env.WORDPRESS_DB_HOST | quote }}
        - name: WORDPRESS_DB_USER
          value: {{ .Values.env.WORDPRESS_DB_USER | quote }}
        - name: WORDPRESS_DB_PASSWORD
          value: {{ .Values.env.WORDPRESS_DB_PASSWORD | quote }}
